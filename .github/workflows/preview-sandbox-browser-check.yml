name: Preview Sandbox Browser Check

# Opt-in only (Issue #1162): this job exercises the embedded-agent preview
# sanitizer's mXSS regression corpus against a REAL Chromium browser (see
# scripts/run-preview-sandbox-browser-check.mjs). It complements the
# always-on bun:test suite (which runs on happy-dom and cannot reproduce
# Chromium's HTML5 parsing edge cases) but is kept out of the default CI
# path to keep CI cheap -- run it manually, or label a PR
# "run-browser-check" to run it automatically on that PR.
#
# No Chromium download step: relies on the Google Chrome preinstalled on
# GitHub-hosted ubuntu-latest runners (resolved by
# scripts/run-preview-sandbox-browser-check.mjs's own executable-path
# lookup), so this job adds no extra install cost beyond the normal
# `bun install`.

on:
  workflow_dispatch: {}
  pull_request:
    types: [labeled]

jobs:
  browser-check:
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'run-browser-check'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install

      - name: Run preview-sandbox real-Chromium check
        run: bun scripts/run-preview-sandbox-browser-check.mjs
