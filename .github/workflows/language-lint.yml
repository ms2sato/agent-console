name: Language Lint

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - 'docs/**'
      - '.claude/**'
      - 'CLAUDE.md'
      - 'scripts/check-public-artifacts-language.mjs'
      - 'scripts/__tests__/check-public-artifacts-language.test.mjs'
      - 'package.json'
      - '.github/workflows/language-lint.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/*.md'
      - 'docs/**'
      - '.claude/**'
      - 'CLAUDE.md'
      - 'scripts/check-public-artifacts-language.mjs'
      - 'scripts/__tests__/check-public-artifacts-language.test.mjs'
      - 'package.json'
      - '.github/workflows/language-lint.yml'

permissions:
  contents: read

jobs:
  language-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"

      - name: Run language check
        run: bun run check:lang

      - name: Run language-check unit tests
        run: bun run test:scripts
