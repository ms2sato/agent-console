[install]
# Supply chain attack mitigation: refuse npm package versions younger than 7 days.
# Many compromised packages are detected or unpublished within a few days of release,
# so a short cool-off window catches the common case without significantly slowing
# routine dependency updates.
#
# `minimumReleaseAge` was added in Bun 1.3.0, but the repo as a whole requires
# Bun 1.3.5+ (see `engines.bun`). `scripts/check-bun-version.mjs` (run via
# `preinstall`) hard-fails older Bun so this setting is never silently ignored.
#
# Emergency override (do NOT edit this file — leave the gate intact):
#   bun add <pkg> --minimum-release-age 0
#   BUN_CONFIG_MINIMUM_RELEASE_AGE=0 bun install
#
# Document the reason (e.g., CVE-XXXX-YYYY) in the commit / PR when bypassing.
#
# Reference: https://bun.com/docs/runtime/bunfig#install-minimumReleaseAge
minimumReleaseAge = 604800
